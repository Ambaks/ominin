# Judge rubric weights for final scoring.
# Weights are relative — normalized to sum to 1.0 at runtime.

judge_weights:
  hook_strength: 1.5
  emotional_peak: 1.2
  self_contained: 1.0
  delivery: 1.0
  payoff: 1.3
  quotability: 0.8

# Sensor-prior multiplier: candidates with strong sensor signals
# get a boost even if the judge is lukewarm.
sensor_prior_weight: 0.15

# Diversity constraints
diversity:
  max_same_type: 2
  min_gap_s: 60.0
